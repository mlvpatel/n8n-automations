# gitleaks allowlist — these are instructional placeholders, not real secrets
title = "n8n-workflow-library gitleaks config"
[extend]
useDefault = true
[allowlist]
description = "Placeholder keys shown in workflow templates for users to replace"
regexes = [
  '''INSERT YOUR KEY HERE''',
  '''BEGIN PRIVATE KEY-----\\n\[INSERT''',
  '''YOUR_[A-Z_]+''',
  '''glpat-x+''',
  '''Add your .* credential''',
]
